<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Accessibility Speech-to-Text Tool</title>
<link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

<div class="hamburger-menu" onclick="toggleMenu()">
    ☰
    <button id="hamburgerBtn">Toggle Menu</button>
</div>

<button id="saveBtn" onclick="saveCurrentChat()">Save Chat</button>

<div id="sideMenu" class="side-menu">
    <h2 style="color: white; padding-left: 32px;">History</h2>
    <div id="historyList"></div>
    <hr style="border: 0.5px solid #ccc; margin: 10px 20px;">
    <h3 style="color: #333; padding-left: 32px; font-size: 18px">Saved Chats</h3>
    <div id="savedChats">
        <a href="#" style="font-size: 14px; color: #555;">No saved chats yet...</a>
    </div>    <!-- Saved chats will be listed here -->
</div>

<div class="container">

<h1> Speech to Text Accessibility Tool</h1>

<p>
This tool helps people with hearing disabilities by converting spoken language
into readable text in real time.
</p>

<button id="startBtn">Start Listening</button>
<button id="stopBtn">Stop Listening</button>
<button id="clearBtn">Clear Transcript</button>

<div id="output">Transcript will appear here...</div>
<script src="script.js"></script>

<script>
    function toggleMenu() {
        const menu = document.getElementById('sideMenu');
        const mainContent = document.querySelector('.container'); // Main content area to shift when menu opens
        const hamburger = document.querySelector('.hamburger-menu'); // Hamburger menu element
        if (menu.style.width === '250px') {
            menu.style.width = '0';
            mainContent.style.marginLeft = '';
            hamburger.style.color = 'black'; // Reset hamburger color when menu is closed
        } else {
            menu.style.width = '250px';
            mainContent.style.marginLeft = '250px'; //pushes content to right
            hamburger.style.color = 'white'; // Change hamburger color when menu is open
        }
    }

    function saveCurrentChat() {
        const outputDiv = document.getElementById('output');
        const transcript = outputDiv.innerText;
        if (transcript === 'Transcript will appear here...' || transcript.trim() === "") {
            alert('No transcript to save!');
            return;
        }

        let chatTitle = prompt('Enter a title for this chat:', `Chat from ${new Date().toLocaleString()}`);
        if (chatTitle === null) return;

        let savedChats = JSON.parse(localStorage.getItem('savedChats')) || [];
        
        const chatEntry = {
            date: new Date().toLocaleString(),
            content: transcript,
            title: chatTitle
        }
        
        savedChats.push(chatEntry);
        localStorage.setItem('savedChats', JSON.stringify(savedChats));
        
        updateHistoryUI();
        alert('Chat saved!');
    }

    function editChatTitle(index) {
        let savedChats = JSON.parse(localStorage.getItem('savedChats')) || [];

        //Ask user for new title
        let newTitle = prompt('Edit chat title:', savedChats[index].title);

        //If user didn't cancel and entered new title...
        if (newTitle !== null && newTitle.trim() !== "") {
            savedChats[index].title = newTitle.trim(); //Update title in array
            localStorage.setItem('savedChats', JSON.stringify(savedChats)); //Save updated array back to localStorage
            updateHistoryUI(); //Refresh the UI to show updated title
        }
    }
    function updateHistoryUI() {
        const savedChatsContainer = document.getElementById('savedChats');
        savedChatsContainer.innerHTML = ''; // Clear existing entries

        let savedChats = JSON.parse(localStorage.getItem('savedChats')) || [];
        if (savedChats.length === 0) {
            savedChatsContainer.innerHTML = '<a href="#" style="font-size: 14px; color: #555;">No saved chats yet...</a>';
        } else {
            savedChats.forEach((chat, index) => {
                // Create a row for each saved chat
                const row = document.createElement('div');
                row.style.display = 'flex'; //Align children horizontally
                row.style.justifyContent = 'space-between';
                row.style.alignItems = 'center';
                row.style.borderBottom = '1px solid #4a6268'; // Add a separator between chats 

                //1. Chat link
                const chatLink = document.createElement('a');
                chatLink.href = '#';
                chatLink.style.flexGrow = '1'; // Allow link to take up remaining space
                chatLink.style.fontSize = '14px';
                chatLink.innerText = `${chat.title || 'Untitled Chat'} (${chat.date})`;                
                chatLink.onclick = (e) => {
                    e.preventDefault();
                    document.getElementById('output').innerText = chat.content;
                    toggleMenu(); // Close menu after loading chat
                };

                //2. Edit Button
                const editBtn = document.createElement('button');
                editBtn.innerText = '✏️';
                editBtn.style.background = 'none';
                editBtn.style.border = 'none';
                editBtn.style.cursor = 'pointer';
                editBtn.style.padding = '5px';
                editBtn.style.fontSize = '14px';
                editBtn.onclick = (e) => {
                    e.stopPropagation();
                    editChatTitle(index);
                }
                

                //3. Delete button
                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = '🗑️';
                deleteBtn.style.background = 'none';
                deleteBtn.style.border = 'none';
                deleteBtn.style.cursor = 'pointer';
                deleteBtn.style.padding = '5px';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation(); // Prevent triggering the chat load
                    deleteChat(index);
                };

                // Append elements to the row
                row.appendChild(chatLink);
                row.appendChild(editBtn);
                row.appendChild(deleteBtn);
                savedChatsContainer.appendChild(row);
            });
        }
    }

    //Function to remove chat from localStorage
    function deleteChat(index) {
        if (confirm('Are you sure you want to delete this chat?')) {
            let savedChats = JSON.parse(localStorage.getItem('savedChats')) || [];
            savedChats.splice(index, 1); // Remove item at that position
            localStorage.setItem('savedChats', JSON.stringify(savedChats));
            updateHistoryUI(); //Refresh the UI after deletion
        }
    }

    window.onload = function() {
        updateHistoryUI();
    }
</script>
</body>
</html>
