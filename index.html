<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Accessibility Speech-to-Text Tool</title>
<link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

<div class="container">

<h1> Speech to Text Accessibility Tool</h1>

<p>
This tool helps people with hearing disabilities by converting spoken language
into readable text in real time.
</p>

<button id="startBtn">Start Listening</button>
<button id="stopBtn">Stop Listening</button>
<button id="clearBtn">Clear Transcript</button>

<div id="output">Transcript will appear here...</div>
<script src="script.js"></script>
</div>
</body>
</html>
